services:
  redis:
    image: redis:7-alpine
    container_name: raid_redis_prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: raid_api_prod
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      API_PORT: 8080
      REDIS_URL: redis://redis:6379
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: raid_web_prod
    ports:
      - "127.0.0.1:${WEB_HTTP_PORT:-18810}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data: